<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicLover Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff; color: #000; font-family: 'Arial', sans-serif; }
        .navbar { background-color: #000 !important; padding: 0.8rem 2rem; }
        .nav-custom-style { 
            color: #fff !important; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .nav-custom-style:hover { opacity: 0.8; }
        .btn-search { 
            border: 1px solid #fff; 
            background: transparent;
            padding: 4px 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container-fluid">
        <a class="nav-custom-style" href="/">musiclover</a>
        <div class="d-flex align-items-center gap-4">
            <button class="nav-custom-style btn-search" type="button">search</button>
            <a class="nav-custom-style" href="/reg">register</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
