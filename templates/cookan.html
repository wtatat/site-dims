<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>САЙТ БЫЛ ЗАКУКАНЕН</title>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            overflow: hidden;
            background: #000;
        }
        .cookan-page {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
        }
        .cookan-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cookan-title {
            position: relative;
            z-index: 1;
            max-width: min(94vw, 1200px);
            margin: 0;
            color: #fff;
            font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
            font-size: clamp(3rem, 12vw, 10rem);
            line-height: 0.9;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0;
            text-shadow:
                0 6px 0 #000,
                0 0 24px #000,
                0 0 60px #000;
        }
    </style>
</head>
<body>
    <main class="cookan-page">
        <img class="cookan-image" src="{{ url_for('cookan_image') }}" alt="">
        <h1 class="cookan-title">САЙТ БЫЛ ЗАКУКАНЕН</h1>
    </main>
</body>
</html>
